                    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegalEdge - India</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #0c1c35; color: #ffffff; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 2px solid #d4af37; }
        .menu-btn { font-size: 30px; cursor: pointer; color: #d4af37; }

        .hero { text-align: center; padding: 40px 0; }
        .cta-btn { background: #d4af37; color: #0c1c35; padding: 15px 30px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        
        /* Service Cards (Clickable) */
        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1a2a47; padding: 20px; border: 1px solid #d4af37; text-decoration: none; color: white; border-radius: 5px; text-align: center; transition: 0.3s; }
        .card:hover { background: #d4af37; color: #0c1c35; }

</head>
<body>

<div class="container">

<script>
    function toggleMenu() {
        var menu = document.getElementById("nav-menu");
        menu.style.display = (menu.style.display === "block") ? "none" : "block";
    }
</script>

</html>
