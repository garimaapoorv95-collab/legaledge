<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Legaledge</title>
    <style>
        :root { --bg-pink: #FFE5EC; --sea-blue: #0077B6; --text-black: #000000; --white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; color: var(--text-black); }
        body { background: var(--bg-pink); }
        nav { background: var(--white); padding: 1rem 5%; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: 800; color: var(--sea-blue); text-decoration: none; }
        .nav-links a { text-decoration: none; font-weight: 600; margin-left: 1rem; font-size: 0.9rem; }
        .container { max-width: 1000px; margin: 3rem auto; padding: 0 1rem; }
        h1 { text-align: center; color: var(--sea-blue); margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .box { background: var(--white); border-radius: 8px; overflow: hidden; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .box img { width: 100%; height: 180px; object-fit: cover; }
        .caption { padding: 0.8rem; font-weight: 600; font-size: 0.9rem; }
        footer { background: #111; text-align: center; padding: 1rem; margin-top: 5rem; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Legaledge</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="service.html">Service</a>
            <a href="blog.html">Blog</a>
            <a href="gallery.html" style="color:var(--sea-blue)">Gallery</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
    <div class="container">
        <h1>Our Work Portfolio</h1>
        <div class="grid">
            <div class="box">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=400&q=80" alt="Web">
                <div class="caption">Web Designing Work</div>
            </div>
            <div class="box">
                <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?auto=format&fit=crop&w=400&q=80" alt="Graphics">
                <div class="caption">Banners & Graphics Design</div>
            </div>
            <div class="box">
                <img src="https://images.unsplash.com/photo-1450133064473-71024230f91b?auto=format&fit=crop&w=400&q=80" alt="Legal">
                <div class="caption">GST & MSME Compliance</div>
            </div>
        </div>
    </div>
    <footer><p style="color:#fff">&copy; 2026 treksea.in / Legaledge</p></footer>
</body>
</html>
